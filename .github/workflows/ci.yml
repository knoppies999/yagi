name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Separate steps so a failure names the gate that broke.
      - run: npm run compile
      - run: npm run check:webview
      - run: npm run lint
      - run: npm run test
